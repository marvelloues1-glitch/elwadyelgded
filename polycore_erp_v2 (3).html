<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الوادي الجديد GGR — نظام إدارة التجارة والتوريد</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<!-- إضافة مكتبة التصدير المفقودة -->
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:#f0ebe0;direction:rtl}
:root{--sb:#1a2035;--acc:#e8572a;--bg:#f0ebe0;--card:#fff;--text:#1a2035;--muted:#7a8299;--border:#e5e7eb;--green:#16a34a;--red:#dc2626;--blue:#2563eb}
#app{display:flex;min-height:100vh}
#sidebar{width:215px;background:var(--sb);position:fixed;top:0;right:0;height:100vh;overflow-y:auto;z-index:50;flex-direction:column;display:flex}
#sidebar{scrollbar-width:thin;scrollbar-color:#2a3555 var(--sb)}
#sidebar::-webkit-scrollbar{width:3px}
#sidebar::-webkit-scrollbar-thumb{background:#2a3555}
.logo-area{padding:20px 16px 16px;border-bottom:1px solid #2a3555}
.logo-name{color:#fff;font-size:18px;font-weight:800}
.logo-sub{color:#6a7a9a;font-size:10px;margin-top:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:#9aa5be;font-size:13px;font-weight:500;border-right:3px solid transparent;transition:all .15s}
.nav-item:hover{background:#232d47;color:#fff}
.nav-item.active{background:var(--acc);color:#fff;border-right-color:#fff;font-weight:700}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.75}
.nav-item.active svg{opacity:1}
#main{margin-right:215px;flex:1;padding:28px 32px;min-height:100vh}
.page{display:none}.page.active{display:block}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.page-title{font-size:22px;font-weight:800;color:var(--text)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-dark{background:var(--sb);color:#fff}.btn-dark:hover{background:#2a3555}
.btn-acc{background:var(--acc);color:#fff}.btn-acc:hover{background:#c44820}
.btn-out{background:#fff;color:var(--text);border:1.5px solid var(--border)}.btn-out:hover{background:#f5f5f5}
.btn-red{background:#fee2e2;color:var(--red);border:1px solid #fca5a5}
.btn-green{background:#dcfce7;color:var(--green);border:1px solid #86efac}
.btn-sm{padding:5px 12px;font-size:12px}
.card{background:var(--card);border-radius:12px;border:1px solid #e8e3d8;padding:20px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:12px;border:1px solid #e8e3d8;padding:18px 20px}
.stat-lbl{font-size:11px;color:var(--muted);margin-bottom:6px}
.stat-val{font-size:21px;font-weight:800;color:var(--text)}
.stat-val.g{color:var(--green)}.stat-val.r{color:var(--red)}.stat-val.b{color:var(--blue)}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-card{background:var(--card);border-radius:12px;border:1px solid #e8e3d8;padding:18px 20px}
.chart-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px}
.chart-wrap{position:relative;height:180px}
.tbl-card{background:var(--card);border-radius:12px;border:1px solid #e8e3d8;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{background:#f8f6f1;color:var(--muted);font-size:11.5px;font-weight:700;padding:11px 14px;text-align:right;border-bottom:1px solid #eee;white-space:nowrap}
td{padding:11px 14px;font-size:13px;color:var(--text);border-bottom:1px solid #f4f4f4;text-align:right;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#faf9f6}
.empty{text-align:center;padding:50px;color:var(--muted);font-size:14px}
.bdg{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.bdg-g{background:#dcfce7;color:#15803d}.bdg-r{background:#fee2e2;color:#b91c1c}
.bdg-o{background:#fed7aa;color:#c2410c}.bdg-b{background:#dbeafe;color:#1d4ed8}
.bdg-gray{background:#f3f4f6;color:#6b7280}.bdg-y{background:#fef3c7;color:#b45309}
.bdg-purp{background:#f3e8ff;color:#7e22ce}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(15,20,40,.55);z-index:200;align-items:center;justify-content:center}
.modal-ov.open{display:flex}
.modal{background:#fff;border-radius:16px;width:580px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.2)}
.modal-lg{width:740px}.modal-xl{width:900px}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px 0;margin-bottom:18px}
.modal-title{font-size:17px;font-weight:800;color:var(--text)}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--muted);line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{padding:0 24px 20px}
.modal-footer{display:flex;gap:10px;padding:14px 24px;border-top:1px solid var(--border)}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fg label{font-size:12px;font-weight:700;color:var(--muted)}
.fg input,.fg select,.fg textarea{border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'Cairo',sans-serif;font-size:13px;outline:none;color:var(--text);background:#fff;width:100%;transition:border .15s}
.fg input:focus,.fg select:focus{border-color:var(--acc)}
.fg input[readonly]{background:#f8f6f1;color:var(--muted)}
.fg-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:flex-end}
.filter-bar .fg{margin-bottom:0;min-width:140px}
.itbl{width:100%;border-collapse:collapse;margin:8px 0}
.itbl th{background:#f8f6f1;font-size:11px;font-weight:700;color:var(--muted);padding:7px 10px;border:1px solid #eee;text-align:right}
.itbl td{padding:5px 8px;border:1px solid #eee;font-size:12px}
.itbl input,.itbl select{width:100%;border:none;outline:none;font-family:'Cairo',sans-serif;font-size:12px;background:transparent;padding:2px 4px;color:var(--text)}
.add-row{display:inline-flex;align-items:center;gap:5px;color:var(--blue);font-size:12px;font-weight:700;cursor:pointer;padding:5px 0;background:none;border:none;font-family:'Cairo',sans-serif}
.del-row{background:#fee2e2;border:none;color:var(--red);border-radius:4px;width:22px;height:22px;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;justify-content:center}
.tot-box{background:var(--sb);color:#fff;border-radius:10px;padding:14px 18px;margin-top:10px}
.tot-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;opacity:.85}
.tot-row.big{font-size:15px;font-weight:800;padding-top:8px;margin-top:6px;border-top:1px solid rgba(255,255,255,.2);opacity:1}
.tot-row.big.g{color:#4ade80}.tot-row.big.acc{color:#fb923c}
.rtabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.rtab{padding:8px 16px;border-radius:8px;font-size:12.5px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--muted);transition:all .15s}
.rtab.active{background:var(--sb);color:#fff;border-color:var(--sb)}
.rfil{background:var(--card);border-radius:12px;border:1px solid #e8e3d8;padding:16px 20px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.rfil .fg{margin-bottom:0;min-width:150px}
.abt{background:none;border:none;cursor:pointer;padding:4px 7px;border-radius:6px;font-size:14px;transition:background .1s}
.abt:hover{background:#f0f0f0}
.abt.r:hover{background:#fee2e2}
.lbtn{background:none;border:none;color:var(--blue);cursor:pointer;font-size:13px;font-family:'Cairo',sans-serif;font-weight:600;padding:0}
.lbtn:hover{text-decoration:underline}
.toggle-row{display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:12px}
.toggle{width:40px;height:22px;background:#d1d5db;border-radius:11px;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--acc)}
.toggle::after{content:'';width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;right:2px;transition:right .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on::after{right:20px}
.toggle-lbl{font-size:13px;font-weight:600;color:var(--text)}
.prog-bar{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;min-width:70px;display:inline-block}
.prog-fill{height:100%;background:var(--acc);border-radius:3px}
.tag{display:inline-block;background:#e8e3d8;border-radius:6px;padding:2px 7px;font-size:11px;color:#555;margin:1px}
.sec-title{font-size:13px;font-weight:700;color:var(--text);margin:14px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.bc{font-size:12px;color:var(--muted);margin-bottom:6px}
.bc span{color:var(--acc);cursor:pointer;font-weight:600}
.dv{display:none}.dv.active{display:block}
.inv-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.inv-box{background:#f8f6f1;border-radius:10px;padding:14px 16px}
.inv-box-title{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:10px;text-transform:uppercase}
.inv-box-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
.inv-box-row.total{font-size:14px;font-weight:800;padding-top:8px;margin-top:6px;border-top:1px solid #e5e7eb}
.inv-box-row.total.g{color:var(--green)}.inv-box-row.total.acc{color:var(--acc)}
.inv-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid var(--sb)}
.inv-logo{font-size:20px;font-weight:800;color:var(--sb)}.inv-logo-sub{font-size:10px;color:var(--muted)}
.inv-num{font-size:18px;font-weight:800;color:var(--acc)}

/* LOGIN PAGE */
#login-page {
  display:flex; min-height:100vh; align-items:center; justify-content:center;
  background: linear-gradient(135deg, #1a2035 0%, #2a3a5c 50%, #1a2035 100%);
  direction:rtl; font-family:'Cairo',sans-serif;
}
.login-card {
  background:#fff; border-radius:20px; padding:40px 36px; width:400px;
  max-width:95vw; box-shadow:0 32px 80px rgba(0,0,0,.4);
  animation: slideUp .4s ease;
}
@keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
.login-logo { text-align:center; margin-bottom:24px; }
.login-logo img { width:90px; height:90px; border-radius:50%; object-fit:cover; border:3px solid #e8572a; margin-bottom:10px; }
.login-brand { font-size:20px; font-weight:800; color:#1a2035; }
.login-brand-sub { font-size:12px; color:#e8572a; font-weight:700; letter-spacing:1px; }
.login-title { font-size:15px; color:#7a8299; margin-top:4px; }
.login-field { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
.login-field label { font-size:12px; font-weight:700; color:#7a8299; }
.login-field input {
  border:1.5px solid #e5e7eb; border-radius:10px; padding:11px 14px;
  font-family:'Cairo',sans-serif; font-size:14px; outline:none; color:#1a2035;
  transition:border .15s; direction:rtl;
}
.login-field input:focus { border-color:#e8572a; box-shadow:0 0 0 3px rgba(232,87,42,.1); }
.login-btn {
  width:100%; background:#e8572a; color:#fff; border:none; border-radius:10px;
  padding:13px; font-family:'Cairo',sans-serif; font-size:15px; font-weight:700;
  cursor:pointer; transition:all .15s; margin-top:4px;
}
.login-btn:hover { background:#c44820; transform:translateY(-1px); }
.login-btn:active { transform:translateY(0); }
.login-error {
  background:#fee2e2; border:1px solid #fca5a5; border-radius:8px;
  padding:10px 14px; font-size:13px; color:#b91c1c; margin-bottom:14px;
  display:none; text-align:center; font-weight:600;
}
.login-footer { text-align:center; margin-top:20px; font-size:11px; color:#bbb; }
.login-users-hint {
  background:#f8f6f1; border-radius:8px; padding:10px 14px; font-size:12px;
  color:#7a8299; margin-top:14px; text-align:center;
}
.user-avatar {
  width:32px; height:32px; border-radius:50%; background:#e8572a;
  display:inline-flex; align-items:center; justify-content:center;
  color:#fff; font-size:13px; font-weight:700; margin-left:8px; flex-shrink:0;
}
.topbar {
  position:fixed; top:0; left:0; right:215px; height:52px; background:#fff;
  border-bottom:1px solid #e8e3d8; display:flex; align-items:center;
  justify-content:space-between; padding:0 24px; z-index:40;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.topbar-user { display:flex; align-items:center; gap:10px; }
.topbar-name { font-size:13px; font-weight:700; color:#1a2035; }
.topbar-role { font-size:11px; color:#7a8299; }
.topbar-logout {
  background:#fee2e2; color:#dc2626; border:none; border-radius:8px;
  padding:6px 14px; font-family:'Cairo',sans-serif; font-size:12px;
  font-weight:700; cursor:pointer; transition:all .15s;
}
.topbar-logout:hover { background:#fecaca; }


/* INFO NOTE */
.info-note{background:#fef9ec;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400e;margin-bottom:14px;line-height:1.6}

/* RESPONSIVE - Mobile First */
@media (max-width:768px){
  #sidebar{width:0;overflow:hidden;transition:width .3s}
  #sidebar.mob-open{width:215px}
  #main{margin-right:0!important;padding:70px 14px 20px!important}
  .topbar{right:0!important}
  .stat-grid{grid-template-columns:1fr 1fr!important}
  .charts-grid{grid-template-columns:1fr!important}
  table{font-size:11px}
  th,td{padding:8px 8px!important}
  .page-header{flex-direction:column;align-items:flex-start;gap:10px}
  .page-title{font-size:18px!important}
  .btn{padding:7px 12px!important;font-size:12px!important}
  .modal{width:96vw!important;margin:10px}
  .fg-2,.fg-3{grid-template-columns:1fr!important}
  .filter-bar{flex-direction:column}
  .filter-bar .fg{min-width:100%!important}
  #mob-toggle{display:flex!important}
}
@media (max-width:480px){
  .stat-grid{grid-template-columns:1fr!important}
  th,td{padding:6px 6px!important;font-size:10px}
  .bdg{font-size:10px!important;padding:2px 6px!important}
}
/* Mobile toggle button */
#mob-toggle{display:none;position:fixed;top:12px;right:12px;z-index:200;background:var(--acc);color:#fff;border:none;width:40px;height:40px;border-radius:10px;font-size:20px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(232,87,42,.4)}
#mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49}
#mob-overlay.on{display:block}

/* Reject/Cancel modal colors */
.btn-red{background:#fee2e2;color:var(--red);border:1.5px solid #fca5a5;font-family:'Cairo',sans-serif}
.btn-red:hover{background:#fecaca}

/* Tax table colors */
#tbl-taxes td:nth-child(3){color:var(--blue)}
#tbl-taxes td:nth-child(9){font-weight:800}

/* Debt Tracker Styles */
.chart-container {
  position: relative;
  height: 400px;
  width: 100%;
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #e8e3d8;
  margin-bottom: 20px;
}
.details-box {
  background: #f8f6f1;
  border: 1px solid #e8e3d8;
  padding: 15px;
  border-radius: 8px;
  margin-top: 20px;
  display: none; /* Hidden by default */
}
.details-box h3 { margin-top: 0; color: var(--acc); border-bottom: 2px solid var(--acc); padding-bottom: 5px; display: inline-block; font-size: 15px; }
.details-box p { margin: 5px 0; font-size: 13px; }
.details-box table { width: 100%; margin-top: 10px; font-size: 12px; }
.details-box th { background: #e8e3d8; padding: 6px; }
.details-box td { padding: 6px; border-bottom: 1px solid #e8e3d8; }
.details-box .total-row { font-weight: bold; background: #e8e3d8; }
.details-box .single-event {
  background: #fff8e1; border: 1px solid #ffecb3; padding: 10px;
  border-radius: 6px; margin-bottom: 15px; font-size: 13px;
}
.details-box .single-event strong { color: #c2410c; }




/* AUTH TABS */
.auth-tabs{display:flex;gap:0;margin-bottom:20px;border-radius:10px;overflow:hidden;border:1.5px solid #e5e7eb}
.auth-tab{flex:1;padding:11px;text-align:center;cursor:pointer;font-size:13px;font-weight:700;color:#7a8299;background:#f8f6f1;transition:all .2s;font-family:'Cairo',sans-serif}
.auth-tab.active{background:#1a2035;color:#fff}
.auth-tab:hover:not(.active){background:#e8e3d8}
/* SUCCESS */
.login-success{background:#dcfce7;border:1px solid #86efac;border-radius:8px;padding:10px 14px;font-size:13px;color:#15803d;margin-bottom:14px;text-align:center;font-weight:600}

</style>
</head>
<body>

<!-- LOGIN PAGE -->
<button id="mob-toggle" onclick="toggleMobSidebar()">☰</button>
<div id="mob-overlay" onclick="closeMobSidebar()"></div>
<div id="login-page">

const paidFor=id=>DB.payments.filter(p=>String(p.invoiceId)===String(id)).reduce((s,p)=>s+p.amount,0);
const invSt = inv => {
  const p = paidFor(inv.id);
  const totalDeds = (inv.insAmt || 0) + (inv.opsAmt || 0) + (inv.late || 0) + (inv.expLoaded || 0);
  const netToCollect = (inv.net || 0) - totalDeds;
  
  if (netToCollect <= 0.5) return 'مدفوعة'; // لا يوجد مبلغ للتحصيل
  if (p >= netToCollect - 0.5) return 'مدفوعة';
  if (p > 0.5) return 'مدفوعة جزئيًا';
  
  if(inv.dbStatus==='مدفوعة') return 'مدفوعة';
  if(inv.dbStatus==='مدفوعة جزئيًا') return 'مدفوعة جزئيًا';
  return 'غير مدفوعة';
};
const invBdg=inv=>{const s=invSt(inv);return s==='مدفوعة'?'bdg-g':s==='مدفوعة جزئيًا'?'bdg-y':'bdg-r';};
const stBdg=s=>s==='نشط'?'bdg-g':s==='منتهي'?'bdg-gray':'bdg-o';

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${p.icon}</svg>${p.lbl}

function goPage(pg){
  activePage = pg;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===pg));
  document.querySelectorAll('.page').forEach(el=>el.classList.toggle('active',el.id==='pg-'+pg));
  // reset detail views
  document.querySelectorAll('.dv').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.list-view').forEach(el=>el.style.display='block');
  refreshPage(pg);
}

function refreshPage(pg){

  else if(pg==='clients')renderClients();

  else if(pg==='delivery'){fillClientFilter('fd-cl');fillContractFilter('fd-ct','');renderDelivery();}

  else if(pg==='credits'){fillClientFilter('fcn-cl');renderCredits();}

  else if(pg==='payments'){fillClientFilter('pf-cl');fillYearFilter('pf-year');renderPayments();}

// ==================== ITEMS TABLE ====================
let rowCount={};
function itemsTable(items,pfx){
  rowCount[pfx]=0;
  return `<table class="itbl"><thead><tr><th>الصنف/الوصف</th><th>الوحدة</th><th>الكمية</th><th>سعر الوحدة</th><th>تأمين%</th><th>تأمين عمليات%</th><th>الإجمالي</th><th></th></tr></thead>
  <tbody id="${pfx}-tb">${(items||[{d:'',u:'طن',q:0,p:0,i:0,o:0}]).map((it,n)=>itemRow(pfx,n,it)).join('')}</tbody></table>
  <button class="add-row" onclick="addRow('${pfx}')">+ إضافة صنف</button>`;
}
function itemRow(pfx,n,it){
  it=it||{};
  const units=['طن','كيلو','متر','وحدة','كجم','ل.م'];
  return `<tr id="${pfx}-r${n}">
    <td><input value="${it.d||''}" oninput="calcRows('${pfx}')" onchange="autoFillPrice(this, '${pfx}', ${n})" placeholder="اسم الصنف" list="items-suggestions"></td>
    <td><select onchange="calcRows('${pfx}')">${units.map(u=>`<option${it.u===u?' selected':''}>${u}</option>`).join('')}</select></td>
    <td><input type="number" value="${it.q||0}" min="0" step="any" style="width:65px" oninput="calcRows('${pfx}')"></td>
    <td><input type="number" value="${it.p||0}" min="0" step="any" style="width:80px" oninput="calcRows('${pfx}')"></td>
    <td><input type="number" value="${it.i||0}" min="0" max="100" step="any" style="width:50px" oninput="calcRows('${pfx}')"></td>
    <td><input type="number" value="${it.o||0}" min="0" max="100" step="any" style="width:50px" oninput="calcRows('${pfx}')"></td>
    <td id="${pfx}-ln${n}">0.00 ج.م</td>
    <td><button class="del-row" onclick="delRow('${pfx}',${n})">×</button></td>
  </tr>`;
}
function addRow(pfx){
  const n=rowCount[pfx]=(rowCount[pfx]||0)+1;
  document.getElementById(pfx+'-tb').insertAdjacentHTML('beforeend',itemRow(pfx,n,{}));
  calcRows(pfx);
}
function delRow(pfx,n){if(!confirm('حذف الصنف؟'))return;const el=document.getElementById(pfx+'-r'+n);if(el){el.remove();calcRows(pfx);}}
function getRows(pfx){
  return Array.from(document.querySelectorAll(`#${pfx}-tb tr`)).map((tr,n)=>{
    const ip=tr.querySelectorAll('input,select');
    const q=+ip[2]?.value||0,p=+ip[3]?.value||0;
    return{d:ip[0]?.value||'',u:ip[1]?.value||'طن',q,p,i:+ip[4]?.value||0,o:+ip[5]?.value||0,total:q*p};
  }).filter(it=>it.d||it.q);
}
function calcRows(pfx){
  let tot=0;
  Array.from(document.querySelectorAll(`#${pfx}-tb tr`)).forEach((tr,n)=>{
    const ip=tr.querySelectorAll('input,select');
    const line=(+ip[2]?.value||0)*(+ip[3]?.value||0);
    tot+=line;
    const ld=document.getElementById(pfx+'-ln'+n);if(ld)ld.textContent=fmtN(line)+' ج.م';
  });
  const tel=document.getElementById(pfx+'-tot');if(tel)tel.textContent=fmtN(tot)+' ج.م';
  if(pfx==='inv')calcInvTot();
  if(pfx==='cn')calcCNTot();
  if(pfx==='pi')calcPITot();
}

function autoFillPrice(input, pfx, n) {
  const dl = document.getElementById('items-suggestions');
  const option = Array.from(dl.options).find(opt => opt.value === input.value);
  if (option) {
    const tr = document.getElementById(`${pfx}-r${n}`);
    const ip = tr.querySelectorAll('input,select');
    if (ip[1]) ip[1].value = option.dataset.unit;
    if (ip[3]) ip[3].value = option.dataset.price;
    if (ip[4]) ip[4].value = option.dataset.ins;
    if (ip[5]) ip[5].value = option.dataset.ops;
    calcRows(pfx);
  }
}

function updateItemsDatalist() {
  const suggestions = {};
  const process = (items) => {
    if (!items || !Array.isArray(items)) return;
    items.forEach(it => {
      if (it.d && !suggestions[it.d]) {
        suggestions[it.d] = { p: it.p, u: it.u, i: it.i, o: it.o };
      }
    });
  };
  DB.invoices.forEach(inv => { if (inv.manualItems) process(inv.manualItems); });
  DB.delivery.forEach(dn => process(dn.items));
  DB.contracts.forEach(ct => process(ct.items));
  DB.purchases.forEach(p => process(p.items));

  const dl = document.getElementById('items-suggestions');
  if (!dl) return;
  dl.innerHTML = Object.entries(suggestions).map(([name, data]) => 
    `<option value="${name}" data-price="${data.p||0}" data-unit="${data.u||'وحدة'}" data-ins="${data.i||0}" data-ops="${data.o||0}"></option>`
  ).join('');
}

function viewContract(id){
  const c=DB.contracts.find(x=>String(x.id)===String(id)||String(x._dbId)===String(id)); if(!c) return;
  document.getElementById('dv-ct-num').textContent=c.num;
  document.getElementById('dv-ct-title').textContent='متابعة تنفيذ عقد: ' + c.num + ' — ' + c.clientName;
  
  const doneAmt=DB.delivery.filter(d=>String(d.contractId)===String(c.id)).reduce((s,d)=>(d.items||[]).reduce((ss,it)=>ss+it.total,s),0);
  const overallPct=c.total>0?Math.min(100,(doneAmt/c.total*100)).toFixed(1):0;
  
  const daysLeft = c.end ? Math.ceil((new Date(c.end) - new Date()) / (1000 * 60 * 60 * 24)) : null;
  document.getElementById('dv-ct-days').textContent = daysLeft !== null ? (daysLeft > 0 ? daysLeft + ' يوم' : 'منتهي') : 'غير محدد';
  document.getElementById('dv-ct-total').textContent = fmt(c.total);
  document.getElementById('dv-ct-pct').textContent = overallPct + '%';

  const itemsRows = (c.items||[]).map(ci => {
      let qDelivered = 0;
      DB.delivery.filter(d => String(d.contractId) === String(c.id)).forEach(dn => {
          (dn.items||[]).forEach(dni => {
              if(dni.d === ci.d) qDelivered += dni.q;
          });
      });
      const qRem = Math.max(0, ci.q - qDelivered);
      const iPct = ci.q > 0 ? Math.min(100, (qDelivered / ci.q * 100)).toFixed(1) : 0;
      return `<tr>
          <td>${ci.d}</td>
          <td>${ci.q} ${ci.u}</td>
          <td>${qDelivered} ${ci.u}</td>
          <td style="font-weight:700;color:${qRem>0?'var(--red)':'var(--green)'}">${qRem} ${ci.u}</td>
          <td>
            <div style="display:flex;align-items:center;gap:6px">
                <div class="prog-bar"><div class="prog-fill" style="width:${iPct}%"></div></div>${iPct}%
            </div>
          </td>
      </tr>`;
  }).join('');
  document.getElementById('dv-ct-items').innerHTML = itemsRows || '<tr><td colspan="5" class="empty">لا توجد أصناف</td></tr>';
  document.getElementById('list-contracts').style.display='none';
  document.getElementById('dv-contracts').classList.add('active');
}

let debtChart = null;
let debtTimelineEvents = [];

function renderDebtTracker() {
    const clientSelect = document.getElementById('debt-client-select');
    if (!clientSelect) return;
    clientSelect.innerHTML = '<option value="">-- اختر عميلاً --</option>';
    DB.clients.sort((a, b) => a.name.localeCompare(b.name)).forEach(client => {
        const option = document.createElement('option');
        option.value = client.id;
        option.textContent = client.name;
        clientSelect.appendChild(option);
    });
    // Clear previous chart and details
    if (debtChart) debtChart.destroy();
    document.getElementById('debtDetailsBox').style.display = 'none';
}

function generateDebtChart(clientId) {
    const detailsBox = document.getElementById('debtDetailsBox');
    detailsBox.style.display = 'none';

    if (debtChart) {
        debtChart.destroy();
    }
    if (!clientId) return;

    const clientInvoices = DB.invoices.filter(inv => String(inv.clientId) === String(clientId));
    const clientPayments = DB.payments.filter(p => String(p.clientId) === String(clientId));

    debtTimelineEvents = [];
    clientInvoices.forEach(inv => {
        debtTimelineEvents.push({ date: inv.date, type: 'invoice', amount: inv.net, ref: inv });
    });
    clientPayments.forEach(p => {
        debtTimelineEvents.push({ date: p.date, type: 'payment', amount: p.amount, ref: p });
    });
    debtTimelineEvents.sort((a, b) => new Date(a.date) - new Date(b.date));

    if (debtChart) debtChart.destroy();

    let prevBalance = 0;
    let balance = 0;
    const chartData = [];
    const backgroundColors = [];
    const borderColors = [];

    const colorIncrease = 'rgba(220, 53, 69, 0.7)'; // Red
    const colorDecrease = 'rgba(22, 163, 74, 0.7)'; // Green

    debtTimelineEvents.forEach(event => {
        prevBalance = balance;
        if (event.type === 'invoice') {
            balance += event.amount;
        } else {
            balance -= event.amount;
        }
        chartData.push({ x: new Date(event.date).getTime(), y: balance });
        backgroundColors.push(balance > prevBalance ? colorIncrease : colorDecrease);
        borderColors.push(balance > prevBalance ? 'rgb(220, 53, 69)' : 'rgb(22, 163, 74)');
    });
    const ctx = document.getElementById('debtChartCanvas').getContext('2d');

    debtChart = new Chart(ctx, {
        type: 'bar', // This line is not changed, but context is needed.
        data: {
            datasets: [{
                label: 'المديونية',
                data: chartData,
                backgroundColor: backgroundColors,
                borderColor: borderColors,
                barThickness: 'flex',
                maxBarThickness: 50,
                borderRadius: 4,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            scales: {
                x: { 
                    type: 'time', 
                    time: { 
                        unit: 'day', 
                        tooltipFormat: 'yyyy-MM-dd', 
                        displayFormats: { day: 'dd MMM' } 
                    },
                    grid: { display: false }
                },
                y: { 
                    ticks: { callback: value => fmt(value), font: { family: 'Cairo' } },
                    grid: { color: '#f0ebe0' }
                }
            },
            plugins: { tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${fmt(ctx.raw.y)}` } } },
            onClick: (e, elements) => {
                if (elements.length > 0) {
                    const index = elements[0].index;
                    showDebtDetails(debtTimelineEvents[index]);
                }
            }
        }
    });
}

function showDebtDetails(event) {
    const index = debtTimelineEvents.indexOf(event);
    if (index === -1) return;

    const asOfDate = new Date(event.date);
    const currentBalance = debtChart.data.datasets[0].data[index].y;

    const detailsBox = document.getElementById('debtDetailsBox');
    let html = '';

    // 1. Show the single event that was clicked
    if (event.type === 'invoice') {
        const inv = event.ref;
        html += `<div class="single-event"><strong>الحدث:</strong> إضافة فاتورة #${inv.num} بقيمة ${fmt(inv.net)}</div>`;
    } else {
        const p = event.ref;
        html += `<div class="single-event"><strong>الحدث:</strong> تسجيل دفعة بقيمة ${fmt(p.amount)}</div>`;
    }

    // 2. Show the breakdown of the current balance
    html += `<h3>تفاصيل المديونية حتى تاريخ ${event.date}</h3>`;

    const relevantInvoices = DB.invoices.filter(i => String(i.clientId) === String(event.ref.clientId) && new Date(i.date) <= asOfDate);
    const relevantPayments = DB.payments.filter(p => String(p.clientId) === String(event.ref.clientId) && new Date(p.date) <= asOfDate);

    let outstandingInvoicesHTML = '<table><thead><tr><th>رقم الفاتورة</th><th>إجمالي الفاتورة</th><th>المدفوع حتى الآن</th><th>المتبقي</th></tr></thead><tbody>';
    let calculatedBalance = 0;

    relevantInvoices.forEach(inv => {
        const paidOnThisInvoice = relevantPayments.filter(p => String(p.invoiceNum) === String(inv.num)).reduce((sum, p) => sum + p.amount, 0);
        const remaining = inv.net - paidOnThisInvoice;
        if (remaining > 0.5) { // Only show invoices with a remaining balance
            outstandingInvoicesHTML += `<tr><td>#${inv.num}</td><td>${fmt(inv.net)}</td><td>${fmt(paidOnThisInvoice)}</td><td>${fmt(remaining)}</td></tr>`;
            calculatedBalance += remaining;
        }
    });

    outstandingInvoicesHTML += `<tr class="total-row"><td colspan="3">إجمالي المديونية المحسوب</td><td>${fmt(calculatedBalance)}</td></tr>`;
    outstandingInvoicesHTML += `</tbody></table><p style="font-size:11px; color: #7a8299; text-align:center; margin-top:5px;">(الرصيد في الرسم البياني: ${fmt(currentBalance)})</p>`;
    
    html += outstandingInvoicesHTML;
    detailsBox.innerHTML = html;
    detailsBox.style.display = 'block';
}

  let sub = 0;
  if(_selDN.size > 0){
    const dns=Array.from(_selDN).map(id=>DB.delivery.find(d=>String(d.id)===String(id))).filter(Boolean);
    sub = dns.reduce((s, d) => (d.items || []).reduce((ss, it) => ss + it.total, s), 0);
    document.getElementById('inv-manual-section').style.opacity='0.5';
    document.getElementById('inv-manual-section').style.pointerEvents='none';
  } else {
    const mItems = getRows('inv');
    sub = mItems.reduce((s, it) => s + it.total, 0);
    document.getElementById('inv-manual-section').style.opacity='1';
    document.getElementById('inv-manual-section').style.pointerEvents='auto';
  }
  const insAmt = +document.getElementById('inv-ins-amt')?.value || 0;
  const opsAmt = +document.getElementById('inv-ops-amt')?.value || 0;
  const vat = _invToggles.vat ? sub * 0.14 : 0;
  const wht = _invToggles.wht ? sub * 0.01 : 0;
  const late = +document.getElementById('inv-late')?.value || 0;
  const exp = +document.getElementById('inv-exp')?.value || 0;
  const net = sub + vat - wht;
  const netReceivableFromClient = net - insAmt - opsAmt;
  const admNet = sub - late - exp;
  const sv = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  sv('ir-sub', fmtN(sub) + ' ج.م'); sv('ir-vat', '+ ' + fmtN(vat) + ' ج.م'); sv('ir-wht', '- ' + fmtN(wht) + ' ج.م');
  sv('ir-net', fmtN(net) + ' ج.م');
  sv('ir-ins-amt', '- ' + fmtN(insAmt) + ' ج.م');
  sv('ir-ops-amt', '- ' + fmtN(opsAmt) + ' ج.م');
  sv('ir-net-client', fmtN(netReceivableFromClient) + ' ج.م');
  sv('ir-adm', fmtN(sub) + ' ج.م'); sv('ir-adm-late', '- ' + fmtN(late) + ' ج.م'); sv('ir-adm-exp', '- ' + fmtN(exp) + ' ج.م'); sv('ir-adm-net', fmtN(admNet) + ' ج.م');
  _invCalc = { sub, vat, wht, net, admNet, late, exp, insAmt, opsAmt, netReceivableFromClient };
}

function renderReceivables(){
  const tb=document.getElementById('tbl-recv');if(!tb)return;
  const filterClientId = document.getElementById('fr-cl')?.value || '';
  let totalRecv=0, totalIns=0, totalOps=0, totalCN=0;

  // سنقوم بالعرض مجمعاً حسب العميل لسهولة معرفة الموقف المالي لكل شركة
  // Display grouped by client for easier financial overview
  const clientSummary = DB.clients.map(cl => {
    const invs = DB.invoices.filter(i => String(i.clientId) === String(cl.id));
    const totalInvoiced = invs.reduce((s, i) => s + i.net, 0);

    const clientPayments = DB.payments.filter(p => String(p.clientId) === String(cl.id));
    const totalPaid = DB.payments.filter(p => String(p.clientId) === String(cl.id)).reduce((s, p) => s + p.amount, 0);
    
    // Calculate client-specific insurance and credit notes
    const clientInsAmt = invs.reduce((s, i) => s + (i.insAmt || 0), 0);
    const clientOpsAmt = invs.reduce((s, i) => s + i.opsAmt, 0);
    const clientCredits = DB.credits.filter(c => String(c.clientId) === String(cl.id)).reduce((s, c) => s + c.net, 0);
    
    const balance = totalInvoiced - totalPaid;
    if(balance > 0) totalRecv += balance;

    return { id: cl.id, name: cl.name, totalInvoiced, totalPaid, balance, invCount: invs.length, clientInsAmt, clientOpsAmt, clientCredits };
  }).filter(s => (s.totalInvoiced > 0 || s.totalPaid > 0 || s.clientInsAmt > 0 || s.clientOpsAmt > 0 || s.clientCredits > 0) && (!filterClientId || String(s.id) === String(filterClientId)));

  tb.innerHTML = clientSummary.length ? clientSummary.map(s => {
    const hasGlobalDed = DB.invoices.filter(i => String(i.clientId) === String(s.id)).some(inv => (inv.insAmt > 0 || inv.opsAmt > 0 || inv.late > 0 || inv.expLoaded > 0));
    return `<tr> 
      <td><button class="lbtn" onclick="goPage('clients');viewClient('${s.id}')">${s.name}</button></td>
      <td>${s.invCount} فاتورة</td>
      <td>${fmt(s.totalInvoiced)}</td>
      <td>${fmt(s.totalPaid)}</td>
      <td style="font-weight:800; color:${s.balance > 0.5 ? 'var(--red)' : 'var(--green)'}">${fmt(s.balance)}</td>
      <td style="color:var(--acc)">${fmt(s.clientInsAmt)}</td>
      <td style="color:var(--blue)">${fmt(s.clientOpsAmt)}</td>
      <td style="color:var(--muted)">${fmt(s.clientOthers)}</td>
      <td style="color:var(--green)">${fmt(s.clientCredits)}</td>
      <td>
        <span class="bdg ${s.balance <= 0.5 ? 'bdg-g' : s.totalPaid > 0 ? 'bdg-y' : 'bdg-r'}">
          ${s.balance <= 0.5 ? 'خالص' : s.totalPaid > 0 ? 'متبقي جزئي' : 'غير مدفوع'}
        </span>
      </td>
      <td><button class="btn btn-acc btn-sm" onclick="openPaymentModal(null, '${s.id}')">+ تحصيل</button></td>
    </tr>`}).join('') : '<tr><td colspan="10" class="empty">لا توجد مديونيات حالية</td></tr>';

  totalIns = DB.invoices.reduce((s, i) => s + i.insAmt, 0) + DB.tenders.filter(t => t.type === 'final' && t.status === 'active').reduce((s,t)=>s+t.amount,0);
  totalOps = DB.invoices.reduce((s, i) => s + i.opsAmt, 0) + DB.tenders.filter(t => t.type === 'initial' && t.status === 'active').reduce((s,t)=>s+t.amount,0);
  totalCN = DB.credits.reduce((s, c) => s + c.net, 0);

  const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  sv('rv-recv',fmt(totalRecv));sv('rv-ins',fmt(totalIns));sv('rv-ops',fmt(totalOps));sv('rv-cn',fmt(totalCN));
}

async function allocateUnallocatedPayments() {
  if (!confirm('هل أنت متأكد من تخصيص جميع الدفعات المجمعة لأقدم الفواتير المستحقة؟')) return;
  showLoader('جاري تخصيص الدفعات المجمعة...');

  try {
    const clients = DB.clients;
    let allocatedCount = 0;
    let newPayments = [];
    let updatedUnallocatedPayments = [];
    let deletedUnallocatedPayments = [];

    for (const client of clients) {
      // 1. Get unallocated payments for this client, oldest first
      const unallocatedPayments = DB.payments
        .filter(p => String(p.clientId) === String(client.id) && !p.invoiceId)
        .sort((a, b) => new Date(a.date) - new Date(b.date));

      // 2. Get outstanding invoices for this client, oldest first
      const outstandingInvoices = DB.invoices
        .filter(inv => String(inv.clientId) === String(client.id) && (inv.net - paidFor(inv.id)) > 0.5)
        .sort((a, b) => new Date(a.date) - new Date(b.date));

      for (const unallocatedPay of unallocatedPayments) {
        let remainingPaymentAmount = unallocatedPay.amount;

        for (const outstandingInv of outstandingInvoices) {
          const invoiceRemaining = outstandingInv.net - paidFor(outstandingInv.id);

          if (invoiceRemaining > 0.5 && remainingPaymentAmount > 0.5) { // Ensure positive amounts
            const amountToAllocate = Math.min(remainingPaymentAmount, invoiceRemaining);

            // Create a new allocated payment record
            newPayments.push({
              client_id: client._dbId,
              invoice_id: outstandingInv._dbId,
              amount: amountToAllocate,
              payment_date: unallocatedPay.date, // Use original unallocated payment date
              method: unallocatedPay.method,
              reference: unallocatedPay.ref,
              notes: `تخصيص من دفعة مجمعة #${unallocatedPay.id} (${unallocatedPay.notes})`
            });
            allocatedCount++;
            remainingPaymentAmount -= amountToAllocate;
          }
        }

        // Update or delete the original unallocated payment
        if (remainingPaymentAmount <= 0.5) { // Fully allocated
          deletedUnallocatedPayments.push(unallocatedPay._dbId);
        } else if (remainingPaymentAmount < unallocatedPay.amount) { // Partially allocated
          updatedUnallocatedPayments.push({ id: unallocatedPay._dbId, amount: remainingPaymentAmount, notes: `دفعة مجمعة متبقية بعد التخصيص` });
        }
      }
    }

    // Perform all Supabase operations
    await Promise.all(newPayments.map(p => sbInsert('payments', p)));
    await Promise.all(updatedUnallocatedPayments.map(p => sbUpdate('payments', p.id, { amount: p.amount, notes: p.notes })));
    await Promise.all(deletedUnallocatedPayments.map(id => sbDelete('payments', id)));
    showToast(`✓ تم تخصيص ${allocatedCount} دفعة بنجاح!`);
  } catch (e) {
    showToast('❌ حدث خطأ أثناء التخصيص: ' + e.message, 'error');
    console.error(e);
  } finally {
    await loadAllData(); // Reload all data to update UI
  }
}

async function savePayment(){
  const cid=document.getElementById('pay-cl')?.value;
  const iid=document.getElementById('pay-inv')?.value;
  if(!cid){alert('العميل مطلوب');return;} 

  const inv = (iid && iid !== "") ? DB.invoices.find(i => String(i.id) === String(iid)) : null;
  const totalDeds = inv ? (inv.insAmt||0) + (inv.opsAmt||0) + (inv.late||0) + (inv.expLoaded||0) : 0;
  const netToCollect = inv ? inv.net - totalDeds : 0;
  const rem = inv ? netToCollect - paidFor(iid) : 0;
  
  const amt=+document.getElementById('pay-amt')?.value||rem;
  if(amt<=0){alert('المبلغ يجب أن يكون أكبر من صفر');return;}

  const payload = {
    client_id: cid,
    invoice_id: inv ? (inv._dbId || inv.id) : null,
    amount: amt,
    payment_date: document.getElementById('pay-date')?.value||today(),
    method: document.getElementById('pay-meth')?.value||'غير محدد',
    reference: document.getElementById('pay-ref')?.value||null,
    notes: document.getElementById('pay-notes')?.value||(iid ? '' : 'دفعة مجمعة على الحساب')
  };
  showLoader();
  const res = await sbInsert('payments', payload);
  if(res) {
    showToast('✓ تم تسجيل الدفعة بنجاح');
    closeMod('payment');
    await loadAllData();
  }
  hideLoader();
}

function fillYearFilter(id) {
  const s = document.getElementById(id); if (!s) return;
  const years = new Set();
  const currentYear = new Date().getFullYear();

  // إضافة سنين من 2022 إلى السنة القادمة كخيار افتراضي
  for(let y = 2022; y <= currentYear + 1; y++) years.add(y);

  // إضافة أي سنين موجودة في البيانات فعلياً
  DB.invoices.forEach(i => { if (i.date) years.add(new Date(i.date).getFullYear()); });
  DB.expenses.forEach(e => { if (e.date) years.add(new Date(e.date).getFullYear()); });
  DB.purchases.forEach(p => { if (p.date) years.add(new Date(p.date).getFullYear()); });
  DB.contracts.forEach(c => { if (c.start) years.add(new Date(c.start).getFullYear()); });

  const sortedYears = Array.from(years).sort((a, b) => b - a); // Descending order
  if (!sortedYears.includes(currentYear)) sortedYears.unshift(currentYear); // Ensure current year is an option

  s.innerHTML = '<option value="">الكل (كل السنين)</option>' + 
    sortedYears.map(year => `<option value="${year}">${year}</option>`).join('');
}

function runStatement(){
  const cid=document.getElementById('rs-cl')?.value;
  const from=document.getElementById('rs-from')?.value||'';
  const to=document.getElementById('rs-to')?.value||'';
  if(!cid){alert('اختر العميل');return;}
  const invs=DB.invoices.filter(i=>String(i.clientId)===String(cid)&&(!from||i.date>=from)&&(!to||i.date<=to));
  const pays=DB.payments.filter(p=>String(p.clientId)===String(cid)&&(!from||p.date>=from)&&(!to||p.date<=to));
  let rows=[],bal=0;
  [...invs.map(i=>({date:i.date,desc:'فاتورة '+i.num,dr:i.net,cr:0})),
   ...pays.map(p=>({date:p.date,desc:'دفعة على '+p.invoiceNum,dr:0,cr:p.amount}))]
  .sort((a,b)=>a.date>b.date?1:-1)
  .forEach(r=>{bal+=r.dr-r.cr;rows.push(`<tr><td>${r.date}</td><td>${r.desc}</td><td>${fmt(r.dr)}</td><td>${fmt(r.cr)}</td><td style="font-weight:700;color:${bal>0?'var(--red)':'var(--green)'}">${fmt(bal)}</td></tr>`);});
  document.getElementById('rep-stmt-body').innerHTML=rows.length?rows.join(''):'<tr><td colspan="5" class="empty">لا توجد حركات في هذه الفترة</td></tr>';
}
function runAging(){
  const now=new Date();
  const rows=DB.clients.map(c=>{
    const invs=DB.invoices.filter(i=>String(i.clientId)===String(c.id));
    let b=[0,0,0,0];
    invs.forEach(i=>{
      const paid=paidFor(i.id);const rem=i.net-paid;if(rem<=0)return;
      const days=i.date?Math.floor((now-new Date(i.date))/86400000):0;
      if(days<=30)b[0]+=rem;else if(days<=60)b[1]+=rem;else if(days<=90)b[2]+=rem;else b[3]+=rem;
    });
    const tot=b.reduce((s,v)=>s+v,0);if(!tot)return'';
    return `<tr><td>${c.name}</td>${b.map(v=>`<td>${fmt(v)}</td>`).join('')}<td><b>${fmt(tot)}</b></td></tr>`;
  }).filter(Boolean).join('');
  document.getElementById('rep-aging-body').innerHTML=rows||'<tr><td colspan="6" class="empty">لا توجد ديون</td></tr>';
}
function runMonthly(){
  const yr=document.getElementById('rm-yr')?.value||new Date().getFullYear();
  const mnames=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const rows=mnames.map((m,i)=>{
    const mn=String(i+1).padStart(2,'0'),px=yr+'-'+mn;
    const rev=DB.invoices.filter(v=>v.date?.startsWith(px)).reduce((s,v)=>s+v.net,0);
    const exp=DB.expenses.filter(e=>e.date?.startsWith(px)).reduce((s,e)=>s+e.amount,0)+DB.purchases.filter(p=>p.date?.startsWith(px)).reduce((s,p)=>s+p.net,0);
    const net=rev-exp;
    return `<tr><td>${m} ${yr}</td><td>${fmt(rev)}</td><td>${fmt(exp)}</td><td style="font-weight:700;color:${net>=0?'var(--green)':'var(--red)'}">${fmt(net)}</td></tr>`;
  }).join('');
  document.getElementById('rep-monthly-body').innerHTML=rows;
}
function runAnnual(){

  const rev=DB.invoices.filter(i=>i.date?.startsWith(yr)).reduce((s,i)=>s+i.net,0);
  const exp=DB.expenses.filter(e=>e.date?.startsWith(yr)).reduce((s,e)=>s+e.amount,0)+DB.purchases.filter(p=>p.date?.startsWith(yr)).reduce((s,p)=>s+p.net,0);

}
function runInsReport(){
  const rows=DB.contracts.map(ct=>{
    const cl=DB.clients.find(c=>String(c.id)===String(ct.clientId));
    const insAmt=ct.total*(cl?.ins||0)/100;

    const paid=DB.payments.filter(p=>DB.invoices.filter(i=>String(i.contractId)===String(ct.id)).find(i=>String(i.id)===String(p.invoiceId))).reduce((s,p)=>s+p.amount,0);

                }).join('') + `</tbody></table></div>`;
        }

        const heldFromInvoices = allClientInvs.filter(i => (i.insAmt > 0 || i.opsAmt > 0 || i.late > 0 || i.expLoaded > 0) && (!yr || i.date?.startsWith(yr)));
        console.log(`Client ${cl.name} Held from Invoices for runClientSummary:`, heldFromInvoices); // Debugging line
        if (heldFromInvoices.length > 0 || clientTenders.length > 0) {
            html += `<div class="sec-title">🛡️ التأمينات والاستقطاعات المحتجزة (تحت تصرف العميل)</div>

                clientTenders.map(t => `<tr><td>${t.operationName || 'تأمين مناقصة'}</td><td>${t.date}</td><td>${t.type==='final'?fmt(t.amount):'—'}</td><td>${t.type==='initial'?fmt(t.amount):'—'}</td><td>—</td><td><span class="bdg bdg-y">نشط</span></td></tr>`).join('') +
                `</tbody></table></div>`;

        const totalDue = outstandingInvs.reduce((s,i)=>s + (i.net - (i.insAmt + i.opsAmt + i.late + i.expLoaded) - paidFor(i.id)), 0);

function renderProductsReport() {
  const tb = document.getElementById('tbl-products-report');
  if (!tb) return;

  const productsMap = new Map();
  DB.invoices.forEach(inv => {
    const items = [];
    if (inv.dnIds && inv.dnIds.length > 0) {
      inv.dnIds.forEach(did => {
        const dn = DB.delivery.find(d => String(d.id) === String(did));
        if (dn && dn.items) items.push(...dn.items);
      });
    }
    if (inv.manualItems) items.push(...inv.manualItems);

    items.forEach(it => {
      if (!it.d) return;
      const name = it.d.trim();
      if (!productsMap.has(name)) productsMap.set(name, { name, qty: 0, val: 0, invs: new Set() });
      const p = productsMap.get(name);
      p.qty += (it.q || 0);
      p.val += (it.total || 0);
      p.invs.add(inv.num);
    });
  });

  const data = Array.from(productsMap.values()).sort((a, b) => b.val - a.val);
  const totalVal = data.reduce((s, p) => s + p.val, 0);
  const tvEl = document.getElementById('prod-total-val'); if(tvEl) tvEl.textContent = fmt(totalVal);

  tb.innerHTML = data.length ? data.map(p => `<tr><td>${p.name}</td><td>${p.qty.toLocaleString()}</td><td>${fmt(p.val)}</td><td>${Array.from(p.invs).map(n => `<span class="tag">${n}</span>`).join('')}</td></tr>`).join('') : '<tr><td colspan="4" class="empty">لا توجد بيانات مبيعات منتجات</td></tr>';
}

async function refundInsurance(id) {
  if(!confirm('تأكيد استرداد هذا المبلغ؟')) return;
  showLoader();
  const item = DB.tenders.find(t => String(t.id) === String(id) || String(t._dbId) === String(id));
  if(item?._dbId) await sbUpdate('tenders', item._dbId, {status: 'refunded'});
  await loadAllData();
}

async function deleteInsurance(id) {
  if(!confirm('حذف سجل التأمين؟')) return;
  showLoader();
  const item = DB.tenders.find(t => String(t.id) === String(id) || String(t._dbId) === String(id));
  if(item?._dbId) await sbDelete('tenders', item._dbId);
  await loadAllData();
}

async function saveInsurance(eid) {
  const clId = document.getElementById('ins-cl').value; // This line is not changed, but context is needed.
  const amt = parseFloat(document.getElementById('ins-amt').value);
  if (!clId) { alert('يرجى اختيار العميل'); return; } 
  if (!amt || amt <= 0) { alert('يرجى إدخال مبلغ صحيح'); return; }
  const payload = {
    client_id: clId, // This is already correct from previous diff
    company: DB.clients.find(c => String(c.id) === String(clId))?.name,
    amount: amt,
    type: document.getElementById('ins-type').value,
    contract_id: document.getElementById('ins-ct-link').value || null,
    invoice_id: document.getElementById('ins-inv-link').value || null,
    date: document.getElementById('ins-date').value,
    status: document.getElementById('ins-st').value,
    operation_name: document.getElementById('ins-op').value.trim() // This line is not changed, but context is needed.
  };

  showLoader(); // This is already correct from previous diff
  if (eid && eid !== "undefined" && eid !== "" && eid !== "null") {
    const item = DB.tenders.find(t => String(t.id) === String(eid));
    await sbUpdate('tenders', item?._dbId || eid, payload);
  } else {
    await sbInsert('tenders', payload);
  }
  hideLoader();
  closeMod('insurance');
  await loadAllData();
}

function updateInsLinks(cid, selCt, selInv) {
  const ctEl = document.getElementById('ins-ct-link');
  const invEl = document.getElementById('ins-inv-link');
  if (!cid || !ctEl) return;
  
  const cts = DB.contracts.filter(c => String(c.clientId) === String(cid));
  ctEl.innerHTML = '<option value="">—</option>' + cts.map(c => `<option value="${c.id}" ${String(c.id) === String(selCt) ? 'selected' : ''}>${c.num}</option>`).join(''); 
  const invs = DB.invoices.filter(i => String(i.clientId) === String(cid));
  invEl.innerHTML = '<option value="">—</option>' + invs.map(i => `<option value="${i.id}" ${String(i.id) === String(selInv) ? 'selected' : ''}>${i.num} (${fmt(i.net)})</option>`).join('');
}

// Generic export to Excel
function exportToExcel(data, columns, sheetName, fileName){
  const ws=XLSX.utils.json_to_sheet(data,{header:columns.map(c=>c.key)});
  columns.forEach((c,i)=>{
    const addr=XLSX.utils.encode_cell({r:0,c:i});
    ws[addr]={v:c.label,t:'s'};
  });
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,sheetName);
  XLSX.writeFile(wb,fileName+'.xlsx');
}

function exportInsReportExcel(){
  const data=DB.clients.map(cl=>{
    const clientContracts = DB.contracts.filter(ct => String(ct.clientId) === String(cl.id));
    const clientInvoices = DB.invoices.filter(inv => String(inv.clientId) === String(cl.id));

      active_tenders_insurance: totalTenderIns,
      total_insurance_held: totalInsAmt + totalOpsAmt + totalTenderIns,
      total_collected: totalCollected,
      net_receivable: totalReceivable
    };

function pdfReceivables(){

    return {
      id: cl.id, name: cl.name, totalInvoiced, totalPaid, balance, invCount: invs.length, clientInsAmt, clientOpsAmt, clientCredits
    };
  }).filter(s => (s.totalInvoiced > 0 || s.totalPaid > 0 || s.clientInsAmt > 0 || s.clientOpsAmt > 0 || s.clientCredits > 0) && (!filterClientId || String(s.id) === String(filterClientId)));

function wordAging(){ // New
  const now=new Date();
  const data=DB.clients.map(c=>{
    const invs=DB.invoices.filter(i=>String(i.clientId)===String(c.id));
    let b=[0,0,0,0];
    invs.forEach(i=>{
      const paid=paidFor(i.id);const rem=i.net-paid;if(rem<=0)return;
      const days=i.date?Math.floor((now.getTime()-new Date(i.date).getTime())/86400000):0;
      if(days<=30)b[0]+=rem;else if(days<=60)b[1]+=rem;else if(days<=90)b[2]+=rem;else b[3]+=rem;
    });
    const tot=b.reduce((s,v)=>s+v,0);if(!tot)return null;
    return {client:c.name, '0-30':fmt(b[0]), '31-60':fmt(b[1]), '61-90':fmt(b[2]), '90+':fmt(b[3]), total:fmt(tot)};
  }).filter(Boolean);
  exportToWord('تقرير أعمار الديون', buildTableHTML([
    {key:'client',label:'العميل'},{key:'0-30',label:'0-30 يوم'},
    {key:'31-60',label:'31-60 يوم'},{key:'61-90',label:'61-90 يوم'},
    {key:'90+',label:'+90 يوم'},{key:'total',label:'الإجمالي'}
  ],data));
}

// wordInsReport
function wordInsReport(){ // New
  const data=DB.clients.map(cl=>{
    const clientContracts = DB.contracts.filter(ct => String(ct.clientId) === String(cl.id));
    const clientInvoices = DB.invoices.filter(inv => String(inv.clientId) === String(cl.id)); 

    let totalInsAmt = 0;
    let totalOpsAmt = 0;
    let totalTenderIns = 0;

    clientInvoices.forEach(inv => {
      totalInsAmt += inv.insAmt || 0;
      totalOpsAmt += inv.opsAmt || 0;
    });

    DB.tenders.filter(t => String(t.clientId) === String(cl.id) && t.status === 'active').forEach(t => {
      totalTenderIns += t.amount || 0;
    });

    const totalCollected = DB.payments.filter(p => String(p.clientId) === String(cl.id)).reduce((s,p)=>s+p.amount,0);
    const totalReceivable = clientInvoices.reduce((s,i)=>s+i.net,0) - totalCollected;
    const totalInsHeld = totalInsAmt + totalOpsAmt + totalTenderIns;
    const totalCtVal = clientContracts.reduce((s,ct)=>s+ct.total,0);
    const totalInvVal = clientInvoices.reduce((s,inv)=>s+inv.net,0);

    return {
      client: cl.name, total_contracts_value: fmt(totalCtVal), total_invoices_value: fmt(totalInvVal), insurance_from_invoices: fmt(totalInsAmt), operations_insurance_from_invoices: fmt(totalOpsAmt), active_tenders_insurance: fmt(totalTenderIns), total_insurance_held: fmt(totalInsHeld), total_collected: fmt(totalCollected), net_receivable: fmt(totalReceivable), _hasData: totalInsHeld > 0 || totalCtVal > 0 || totalInvVal > 0
    };
  }).filter(s => s._hasData);

  exportToWord('تقرير التأمينات والمستحقات', buildTableHTML([
    {key:'client',label:'العميل'},
    {key:'total_contracts_value',label:'إجمالي قيمة العقود'},

    {key:'total_insurance_held',label:'إجمالي التأمينات المحتجزة'},

    {key:'net_receivable',label:'صافي المستحق'}
  ],data));
}

// ==================== WORD EXPORT ====================
function exportToWord(title, htmlContent){
  const css = `
    body{font-family:Arial,sans-serif;direction:rtl;font-size:11pt}
    h1{font-size:16pt;color:#1a2035;margin-bottom:8px}
    .sub{font-size:9pt;color:#666;margin-bottom:16px}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th{background:#1a2035;color:#fff;font-size:10pt;padding:6px 8px;text-align:right}
    td{padding:5px 8px;font-size:10pt;border-bottom:1px solid #ddd;text-align:right}
    tr:nth-child(even) td{background:#f8f6f1}
    .footer{margin-top:16px;font-size:9pt;color:#888;text-align:center;border-top:1px solid #ddd;padding-top:8px}
  `;
  const fullHtml = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
  <head><meta charset='utf-8'><title>${title}</title>
  <style>${css}</style>
  <!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>90</w:Zoom><w:DoNotOptimizeForBrowser/></w:WordDocument></xml><![endif]-->
  </head><body>
  <h1>الوادي الجديد GGR — ${title}</h1>
  <div class="sub">تاريخ الإصدار: ${new Date().toLocaleDateString('ar-EG')}</div>
  ${htmlContent}
  <div class="footer">تم إصدار هذا التقرير بواسطة نظام الوادي الجديد GGR — الوادي الجديد GGR ERP</div>
  </body></html>`;
  const blob = new Blob(['\ufeff', fullHtml], {type:'application/msword'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = title+'.doc'; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function buildWordTable(cols, rows){
  const head='<tr>'+cols.map(c=>`<th>${c.label}</th>`).join('')+'</tr>';
  const body=rows.map(r=>'<tr>'+cols.map(c=>`<td>${r[c.key]??'—'}</td>`).join('')+'</tr>').join('');
  return `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
}

function wordInvoices(){
  const cols=[{key:'num',label:'رقم الفاتورة'},{key:'client',label:'العميل'},{key:'date',label:'التاريخ'},{key:'net',label:'صافي المستحق'},{key:'paid',label:'المحصّل'},{key:'remaining',label:'المتبقي'},{key:'status',label:'الحالة'}];
  const rows=DB.invoices.map(inv=>{const paid=paidFor(inv.id);return{num:inv.num,client:inv.clientName,date:inv.date||'—',net:fmt(inv.net),paid:fmt(paid),remaining:fmt(inv.net-paid),status:invSt(inv)};});
  exportToWord('قائمة الفواتير', buildWordTable(cols,rows));
}
function wordPayments(){

function wordStatement(){
  const cid=+document.getElementById('rs-cl')?.value||0;
  if(!cid){alert('اختر العميل أولاً');return;}
  const cl=DB.clients.find(c=>c.id===cid);
  const from=document.getElementById('rs-from')?.value||'';
  const to=document.getElementById('rs-to')?.value||'';
  const invs=DB.invoices.filter(i=>i.clientId===cid&&(!from||i.date>=from)&&(!to||i.date<=to));
  const pays=DB.payments.filter(p=>p.clientId===cid&&(!from||p.date>=from)&&(!to||p.date<=to));
  let bal=0;
  const rows=[...invs.map(i=>({date:i.date,desc:'فاتورة '+i.num,debit:i.net,credit:0})),
              ...pays.map(p=>({date:p.date,desc:'دفعة على '+p.invoiceNum,debit:0,credit:p.amount}))]
    .sort((a,b)=>a.date>b.date?1:-1)
    .map(r=>{bal+=r.debit-r.credit;return{date:r.date,desc:r.desc,debit:fmt(r.debit),credit:fmt(r.credit),balance:fmt(bal)};});
  const cols=[{key:'date',label:'التاريخ'},{key:'desc',label:'البيان'},{key:'debit',label:'مدين'},{key:'credit',label:'دائن'},{key:'balance',label:'الرصيد'}];
  exportToWord('كشف حساب — '+(cl?.name||''), buildWordTable(cols,rows));
}
function wordMonthly(){
  const yr=document.getElementById('rm-yr')?.value||'2026'; 
  const months=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const rows=months.map((m,i)=>{
    const mn=String(i+1).padStart(2,'0'),px=yr+'-'+mn;
    const rev=DB.invoices.filter(v=>v.date?.startsWith(px)).reduce((s,v)=>s+v.net,0);
    const exp=DB.expenses.filter(e=>e.date?.startsWith(px)).reduce((s,e)=>s+e.amount,0)+DB.purchases.filter(p=>p.date?.startsWith(px)).reduce((s,p)=>s+p.net,0);
    return{month:m+' '+yr,revenue:fmt(rev),expenses:fmt(exp),net:fmt(rev-exp)};
  });
  exportToWord('الميزان الشهري '+yr, buildWordTable([{key:'month',label:'الشهر'},{key:'revenue',label:'الإيرادات'},{key:'expenses',label:'المصروفات'},{key:'net',label:'صافي الربح'}],rows));
}

// Default passwords (in real app use Supabase Auth)
const USER_PASSWORDS = {
  'marvel': '1234',
  'mina': '1234',
};
let currentUser = null;

function doLogin(){
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');

  if(!username || !password){
    errEl.style.display='block';
    errEl.textContent='يرجى إدخال اسم المستخدم وكلمة المرور';
    return;
  }

  // Check against DB users
  const user = DB.users.find(u=>u.username===username);
  const expectedPass = USER_PASSWORDS[username] || '1234';

  if(!user || password !== expectedPass){
    errEl.style.display='block';
    errEl.textContent='اسم المستخدم أو كلمة المرور غير صحيحة';
    document.getElementById('login-pass').value='';
    document.getElementById('login-pass').focus();
    // Shake animation
    const card=document.querySelector('.login-card');
    card.style.animation='none';
    card.offsetHeight;
    card.style.animation='shake .4s ease';
    return;
  }

  currentUser = user;
  errEl.style.display='none';

  // Hide login, show app
  document.getElementById('login-page').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('topbar').style.display='flex';
  document.getElementById('main').style.paddingTop='80px';

  // Update topbar
  document.getElementById('topbar-name').textContent=user.name;
  document.getElementById('topbar-role').textContent=user.role;
  document.getElementById('topbar-avatar').textContent=user.name.charAt(0).toUpperCase();

  // If employee role, hide sensitive pages
  if(user.role === 'موظف'){
    restrictEmployee();
  }

  // Refresh dashboard
  drawDashboard();
}

function doLogout(){
  if(!confirm('هل تريد تسجيل الخروج؟')) return;
  currentUser = null;
  localStorage.removeItem('ggr_session'); // مسح الجلسة المحفوظة
  document.getElementById('login-page').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('topbar').style.display='none';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  document.getElementById('login-error').style.display='none';
  // Reset to dashboard
  goPage('dashboard');
}

}

function confirmReject(invId){

  const notes=document.getElementById('rej-notes').value;
  const rejectedInv={...inv, rejectedDate:today(), rejectionReason:reason+(notes?': '+notes:'')};
  DB.rejectedInvoices.push(rejectedInv);
  // Remove from active invoices, free delivery notes
  DB.invoices=DB.invoices.filter(i=>i.id!==invId);
  inv.dnIds?.forEach(did=>{const d=DB.delivery.find(x=>x.id===did);if(d)d.invoiced=false;});

function restoreInvoice(type,id){
  if(!confirm('استعادة الفاتورة وإرجاعها للفواتير النشطة؟'))return; 
  const arr=type==='rejected'?DB.rejectedInvoices:DB.cancelledInvoices;
  const idx=arr.findIndex(i=>i.id===id);
  if(idx<0)return;
  const inv={...arr[idx]};
  delete inv.rejectedDate; delete inv.rejectionReason;
  delete inv.cancelledDate; delete inv.cancellationReason;
  DB.invoices.push(inv);
  arr.splice(idx,1);
  renderInvoices();renderRejected();renderCancelled();renderReceivables();drawDashboard();
}

function permDeleteInvoice(type,id){
  if(!confirm('حذف نهائي؟ لا يمكن التراجع!'))return; 
  if(type==='rejected') DB.rejectedInvoices=DB.rejectedInvoices.filter(i=>i.id!==id);
  else DB.cancelledInvoices=DB.cancelledInvoices.filter(i=>i.id!==id);
  renderRejected();renderCancelled();
}

function renderTaxes(){
  const period=document.getElementById('tax-period')?.value||'monthly';
  const yr=document.getElementById('tax-year')?.value||'2026';
  const months=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

  let rows=[];
  let totals={vat_sales:0,vat_purch:0,vat_net:0,wht_sales:0,wht_purch:0,sales_tax:0,stamp:0,total:0};

  if(period==='monthly'){
    rows=months.map((m,i)=>{
      const mn=String(i+1).padStart(2,'0'),px=yr+'-'+mn;

      // VAT on sales invoices
      const vatSales=DB.invoices.filter(v=>v.date?.startsWith(px)).reduce((s,v)=>s+v.vat,0);
      // VAT on purchases
      const vatPurch=DB.purchases.filter(p=>p.date?.startsWith(px)&&p.applyTax).reduce((s,p)=>s+p.vat,0);
      // WHT on sales (الذي خصمه العملاء منا)
      const whtSales=DB.invoices.filter(v=>v.date?.startsWith(px)).reduce((s,v)=>s+v.wht,0);
      // WHT on purchases (الذي خصمناه نحن من الموردين)
      const whtPurch=DB.purchases.filter(p=>p.date?.startsWith(px)&&p.applyTax).reduce((s,p)=>s+p.wht,0);
      
      // Sales tax (ضريبة المبيعات 1% على بعض العمليات)
      const salesBase=DB.invoices.filter(v=>v.date?.startsWith(px)).reduce((s,v)=>s+v.sub,0);
      const salesTax=salesBase*0.01; // 1%
      // Stamp duty (دمغة) 0.003 on invoices
      const stampDuty=salesBase*0.003;

      const vatNet=vatSales-vatPurch;
      // إجمالي المستحق = صافي القيمة المضافة + الخصم المحصل من العملاء + الخصم المحصل من الموردين + باقي الضرائب
      const totalDue=vatNet+whtSales+whtPurch+salesTax+stampDuty;

      totals.vat_sales+=vatSales;totals.vat_purch+=vatPurch;totals.vat_net+=vatNet; // DB.taxReportData is not defined or populated.
      totals.wht_sales+=(whtSales + whtPurch);totals.sales_tax+=salesTax;totals.stamp+=stampDuty;totals.total+=totalDue;

      const hasData=vatSales||vatPurch||whtSales;
      return `<tr style="${!hasData?'opacity:.4':''}">
        <td><b>${m}</b></td>
        <td>${fmt(salesBase)}</td>
        <td style="color:var(--blue);font-weight:600">${fmt(vatSales)}</td>
        <td style="color:var(--muted)">${fmt(vatPurch)}</td>
        <td style="font-weight:700;color:${vatNet>0?'var(--red)':'var(--green)'}">${fmt(vatNet)}</td>
        <td style="color:var(--yellow)">${fmt(whtSales)}</td>
        <td style="color:var(--muted)">${fmt(salesTax)}</td>
        <td style="color:var(--muted)">${fmt(stampDuty)}</td>
        <td style="font-weight:800;font-size:14px;color:${totalDue>0?'var(--red)':'var(--green)'}">${fmt(totalDue)}</td>
        <td><span class="bdg ${totalDue>0?'bdg-r':'bdg-g'}">${totalDue>0?'مستحق':'لا يوجد'}</span></td>
      </tr>`;
    });
  } else {
    // Quarterly
    const quarters=[['يناير','فبراير','مارس',1,2,3],['أبريل','مايو','يونيو',4,5,6],['يوليو','أغسطس','سبتمبر',7,8,9],['أكتوبر','نوفمبر','ديسمبر',10,11,12]];
    rows=quarters.map((q,qi)=>{
      const label=`الربع ${qi+1} ${yr}`;
      const mnums=q.slice(3).map(n=>String(n).padStart(2,'0'));
      const vatSales=DB.invoices.filter(v=>v.date&&mnums.some(mn=>v.date.startsWith(yr+'-'+mn))).reduce((s,v)=>s+v.vat,0);
      const vatPurch=DB.purchases.filter(p=>p.date&&mnums.some(mn=>p.date.startsWith(yr+'-'+mn))&&p.applyTax).reduce((s,p)=>s+p.vat,0);
      const whtSales=DB.invoices.filter(v=>v.date&&mnums.some(mn=>v.date.startsWith(yr+'-'+mn))).reduce((s,v)=>s+v.wht,0);
      const salesBase=DB.invoices.filter(v=>v.date&&mnums.some(mn=>v.date.startsWith(yr+'-'+mn))).reduce((s,v)=>s+v.sub,0);
      const salesTax=salesBase*0.01;const stampDuty=salesBase*0.003;
      const vatNet=vatSales-vatPurch;const totalDue=vatNet+whtSales+salesTax+stampDuty;
      totals.vat_sales+=vatSales;totals.vat_purch+=vatPurch;totals.vat_net+=vatNet;totals.wht_sales+=whtSales;totals.sales_tax+=salesTax;totals.stamp+=stampDuty;totals.total+=totalDue;
      return `<tr><td><b>${label}</b></td><td>${fmt(salesBase)}</td>
        <td style="color:var(--blue);font-weight:600">${fmt(vatSales)}</td>
        <td style="color:var(--muted)">${fmt(vatPurch)}</td>
        <td style="font-weight:700;color:${vatNet>0?'var(--red)':'var(--green)'}">${fmt(vatNet)}</td>
        <td style="color:var(--yellow)">${fmt(whtSales)}</td>
        <td style="color:var(--muted)">${fmt(salesTax)}</td>
        <td style="color:var(--muted)">${fmt(stampDuty)}</td>
        <td style="font-weight:800;font-size:14px;color:${totalDue>0?'var(--red)':'var(--green)'}">${fmt(totalDue)}</td>
        <td><span class="bdg ${totalDue>0?'bdg-r':'bdg-g'}">${totalDue>0?'مستحق':'لا يوجد'}</span></td>
      </tr>`;
    });
  }

  const tb=document.getElementById('tbl-taxes');if(!tb)return;
  // Totals row
  const totRow=`<tr style="background:#1a2035;color:#fff;font-weight:800">
    <td>الإجمالي</td>
    <td>${fmt(DB.invoices.reduce((s,i)=>s+i.sub,0))}</td>
    <td>${fmt(totals.vat_sales)}</td>
    <td>${fmt(totals.vat_purch)}</td>
    <td>${fmt(totals.vat_net)}</td>
    <td>${fmt(totals.wht_sales)}</td>
    <td>${fmt(totals.sales_tax)}</td>
    <td>${fmt(totals.stamp)}</td>
    <td style="color:#fb923c;font-size:15px">${fmt(totals.total)}</td>
    <td></td>
  </tr>`;
  tb.innerHTML=rows.join('')+totRow;
  DB.taxReportData = rows.map(r => ({period: r.period, sales_base: r.sales_base, vat_sales: r.vat_sales, vat_purch: r.vat_purch, vat_net: r.vat_net, wht: r.wht_sales, sales_tax: r.sales_tax, stamp: r.stamp, total: r.totalDue}));

  const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  sv('tax-vat-sales',fmt(totals.vat_sales));
  sv('tax-vat-purch',fmt(totals.vat_purch));
  sv('tax-vat-net',fmt(totals.vat_net));
  sv('tax-wht',fmt(totals.wht_sales));
  sv('tax-sales',fmt(totals.sales_tax));
  sv('tax-stamp',fmt(totals.stamp));
  sv('tax-total',fmt(totals.total));
}

// ==================== SUPABASE API ====================
async function sbGet(table, query='') {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/${table}?${query}`, {
      headers: SB_HEADERS
    });
    if(!res.ok) {
      const errText = await res.text();
      if (res.status === 503 || errText.includes("paused")) {
        throw new Error("قاعدة البيانات متوقفة (Paused). يرجى الدخول لموقع Supabase وتنشيط المشروع.");
      }
      if (res.status === 404 || errText.includes("does not exist")) {
        throw new Error(`الجدول [${table}] غير موجود. يرجى التأكد من تشغيل أداة الترحيل أولاً.`);
      }
      throw new Error(res.status + ": " + errText);
    }
    return await res.json();
  } catch(e) { 
    console.error('Network/Database Error:', table, e); 
    throw e; // نرفع الخطأ ليظهر للمستخدم
  }
}

async function sbInsert(table, data) {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: SB_HEADERS,
      body: JSON.stringify(data)
    });
    if(!res.ok) throw new Error(await res.text());
    const result = await res.json();
    return Array.isArray(result) ? result[0] : result;
  } catch(e) { console.error('INSERT', table, e); showToast('خطأ في الحفظ: ' + e.message, 'error'); return null; }
}

async function sbUpdate(table, id, data) {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'PATCH',
      headers: SB_HEADERS,
      body: JSON.stringify(data)
    });
    if(!res.ok) throw new Error(await res.text());
    return await res.json();
  } catch(e) { console.error('UPDATE', table, e); showToast('خطأ في التعديل: ' + e.message, 'error'); return null; }
}

async function sbDelete(table, id) {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'DELETE',
      headers: {...SB_HEADERS, 'Prefer': 'return=minimal'}
    });
    if(!res.ok) throw new Error(await res.text());
    return true;
  } catch(e) { console.error('DELETE', table, e); showToast('خطأ في الحذف: ' + e.message, 'error'); return false; }
}

    s.textContent = '@keyframes loading{0%{transform:scaleX(0);transform-origin:left}50%{transform:scaleX(1);transform-origin:left}51%{transform:scaleX(1);transform-origin:right}100%{transform:scaleX(0);transform-origin:right}}';
    document.head.appendChild(s);
    document.body.appendChild(el);
  }
  el.style.display = 'block';
}
function hideLoader() {
  const el = document.getElementById('sb-loader');
  if(el) el.style.display = 'none';
}

// ==================== LOAD ALL DATA FROM SUPABASE ====================
async function loadAllData() {
  showLoader();
  try {
    const dataFetch = await Promise.all([
      // تعديل جلب البيانات الأساسية لتعطي تنبيهاً واضحاً عند الفشل
      sbGet('clients').catch(e => { console.error('Clients fetch error:', e); return []; }),
      sbGet('suppliers').catch(e => { console.error('Suppliers fetch error:', e); return []; }),
      sbGet('users').catch(e => { console.error('Users fetch error:', e); return []; }),
      sbGet('contracts').catch(e => { console.error('Contracts fetch error:', e); return []; }),
      sbGet('delivery_notes').catch(e => { console.error('Delivery fetch error:', e); return []; }),
      sbGet('invoices').catch(e => { console.error('Invoices fetch error:', e); return []; }),
      sbGet('payments').catch(e => { console.error('Payments fetch error:', e); return []; }),
      sbGet('credit_notes').catch(e => { console.warn('Credits table error:', e); return []; }),
      sbGet('purchase_invoices').catch(e => { console.warn('Purchases table error:', e); return []; }),
      sbGet('expenses').catch(e => { console.warn('Expenses table error:', e); return []; }),
      sbGet('rejected_invoices').catch(e => { console.warn('Rejected table error:', e); return []; }),
      sbGet('cancelled_invoices').catch(e => { console.warn('Cancelled table error:', e); return []; }),
      sbGet('tenders').catch(e => { console.warn('Tenders table error:', e); return []; })
    ]);

    const [clients, suppliers, users, contracts, delivery, invoices, payments, credits, purchases, expenses, rejected, cancelled, tenders] = dataFetch;
    
    // فحص إذا كانت الجداول الأساسية فارغة تماماً
    const totalEssentialData = (clients?.length || 0) + (invoices?.length || 0);
    if (totalEssentialData === 0 && clients && invoices) {
      console.warn("تنبيه: البيانات مستلمة كصفوف فارغة. تحقق من سياسات RLS في Supabase.");
      showToast('⚠️ قاعدة البيانات السحابية فارغة أو محمية بسياسات RLS. تأكد من السماح بالوصول (Select Policy)', 'warning');
    }
    console.log('Essential data count:', totalEssentialData);

    console.log('Raw clients from Supabase:', clients);

    // نقوم بتخزين البيانات في مصفوفات مؤقتة أولاً لضمان تحميلها بالترتيب الصحيح قبل ربطها
    const mappedClients = (clients||[]).map(c => ({
      id: c.id, name: c.name, tax: c.tax_number||'', phone: c.phone||'',
      addr: c.address||'', ins: +c.ins_rate||0, _dbId: c.id
    }));
    DB.clients = mappedClients;

    const mappedSuppliers = (suppliers||[]).map(s => ({
      id: s.id, name: s.name, tax: s.tax_number||'', phone: s.phone||'',
      addr: s.address||'', notes: s.notes||'', _dbId: s.id
    }));
    DB.suppliers = mappedSuppliers;

    const mappedUsers = (users||[]).map(u => ({
      id: u.id, name: u.name, username: u.username, role: u.role||'موظف', _dbId: u.id
    }));
    DB.users = mappedUsers;

    const mappedContracts = (contracts||[]).map(c => ({
      id: c.id, clientId: c.client_id, clientName: clientName(c.client_id),
      num: c.contract_num, status: c.status||'نشط',
      start: c.start_date||'', end: c.end_date||'',
      total: +c.total||0, items: c.items||[], _dbId: c.id
    }));
    DB.contracts = mappedContracts;

    const mappedDelivery = (delivery||[]).map(d => ({
      id: d.id, contractId: d.contract_id, clientId: d.client_id,
      clientName: clientName(d.client_id), contractNum: contractNum(d.contract_id),
      num: d.dn_num, date: d.delivery_date||'',
      assignedTo: d.assigned_to, assignedName: userName(d.assigned_to),
      car: d.car_number||'', driver: d.driver_name||'',
      items: d.items||[], status: d.status||'مقبول',
      invoiced: d.invoiced||false, _dbId: d.id
    }));
    DB.delivery = mappedDelivery;

    const mappedInvoices = (invoices||[]).map(i => ({
      id: i.id, clientId: i.client_id, clientName: clientName(i.client_id),
      contractId: i.contract_id, contractNum: contractNum(i.contract_id),
      num: i.invoice_num, date: i.invoice_date||'', // Default to 'غير مدفوعة' if status is not provided.
      dnIds: i.dn_ids||[], sub: +i.sub_total||0, vat: +i.vat_amount||0,
      wht: +i.wht_amount||0, insAmt: +i.ins_amount||0, opsAmt: +i.ops_amount||0,
      late: +(i.late_fee || 0), expLoaded: +(i.exp_loaded || 0),
      net: +i.net_amount||0, admNet: +i.adm_net||0, opsRate: +i.ops_rate||0,
      applyVat: i.apply_vat!==false, applyWht: i.apply_wht!==false, dbStatus: i.status||'', _dbId: i.id,
      manualItems: i.manual_items || [], status: i.status || 'active'
    }));
    DB.invoices = mappedInvoices;
    
    const mappedPayments = (payments||[]).map(p => ({
      id: p.id, clientId: p.client_id, clientName: clientName(p.client_id),
      invoiceId: p.invoice_id, invoiceNum: invoiceNum(p.invoice_id),
      amount: +p.amount||0, date: p.payment_date||'',
      method: p.method||'', ref: p.reference||'', notes: p.notes||'', _dbId: p.id
    }));
    DB.payments = mappedPayments;

    const mappedCredits = (credits||[]).map(c => ({
      id: c.id, clientId: c.client_id, clientName: clientName(c.client_id),
      invoiceId: c.invoice_id, invoiceNum: invoiceNum(c.invoice_id),
      num: c.cn_num, type: c.cn_type, date: c.cn_date||'',
      reason: c.reason||'', items: c.items||[], net: +c.net_amount||0, _dbId: c.id
    }));
    DB.credits = mappedCredits;

    const mappedPurchases = (purchases||[]).map(p => ({
      id: p.id, supplierId: p.supplier_id, supplierName: supplierName(p.supplier_id),
      num: p.invoice_num||'', date: p.invoice_date||'',
      items: p.items||[], sub: +p.sub_total||0, vat: +p.vat_amount||0,
      wht: +p.wht_amount||0,
      net: +p.net_amount||0, applyTax: p.apply_tax!==false, _dbId: p.id
    }));
    DB.purchases = mappedPurchases;

    const mappedExpenses = (expenses||[]).map(e => ({
      id: e.id, cat: e.category, amount: +e.amount||0,
      date: e.expense_date||'', notes: e.notes||'', _dbId: e.id
    }));
    DB.expenses = mappedExpenses;

    const mappedRejected = (rejected||[]).map(r => ({
      ...(r.original_data||{}),
      id: r.id, 
      num: r.invoice_num,
      net: r.net_amount || (r.original_data?.total_final || 0),
      clientName: r.client_name, rejectedDate: r.rejected_date||'', // Duplicate net field in DB.rejectedInvoices mapping
      rejectionReason: r.rejection_reason||'',
      _dbId: r.id
    }));
    DB.rejectedInvoices = mappedRejected;

    const mappedCancelled = (cancelled||[]).map(c => ({
      ...(c.original_data||{}),
      id: c.id, num: c.invoice_num,
      net: c.net_amount || (c.original_data?.total_final || 0),
      clientName: c.client_name, cancelledDate: c.cancelled_date||'', // Duplicate net field in DB.cancelledInvoices mapping
      cancellationReason: c.cancellation_reason||'',
      _dbId: c.id
    }));
    DB.cancelledInvoices = mappedCancelled;

    const mappedTenders = (tenders || []).map(t => {
      const inv = DB.invoices.find(i => String(i._dbId) === String(t.invoice_id) || String(i.id) === String(t.invoice_id));
      return {
        id: t.id, company: t.company || clientName(t.client_id), amount: parseFloat(t.amount) || 0, // التأكد من وجود اسم الشركة للعرض
        clientId: t.client_id, contractId: t.contract_id, invoiceId: t.invoice_id, // Duplicate invoiceNum field in DB.tenders mapping
        type: t.type || 'final',
        invoiceNum: inv ? inv.num : (t.invoice_id || '—'), operationName: t.operation_name, contractNum: contractNum(t.contract_id),
        date: t.date || '', status: t.status || 'active', _dbId: t.id
      };
    });
    DB.tenders = mappedTenders;

    if (dataFetch.some(arr => arr.length > 0)) showToast('✓ تم تحديث البيانات من قاعدة البيانات');
    updateItemsDatalist();
    if(activePage) refreshPage(activePage);
  } catch(e) {
    showToast('⚠️ فشل الاتصال: ' + (e.message.includes('Failed to fetch') ? 'تحقق من اتصال الإنترنت' : e.message), 'error');
    console.error(e);
  } finally {
    hideLoader();
  }
}
