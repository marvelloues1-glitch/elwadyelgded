// INVOICE
async function saveInvoice(eid) {
  const cid = document.getElementById('inv-cl')?.value;
  
  const manualItems = getRows('inv');
  const hasDNs = _selDN && _selDN.size > 0;
  
  if(!hasDNs && manualItems.length === 0) { // Duplicate status field in DB.invoices mapping
    alert('يرجى اختيار إذن تسليم أو إدخال أصناف يدوياً'); 
    return; 
  }

  const c = _invCalc||{};
  let dnIds = hasDNs ? Array.from(_selDN) : []; 
  const invNumVal = document.getElementById('inv-num')?.value || '—'; // Duplicate status field in DB.invoices mapping
  const invDateVal = document.getElementById('inv-date')?.value || today();

  showLoader();

  // معالجة الأصناف اليدوية: منع التكرار وتحديث الإذن التلقائي المرتبط إن وجد
  if (!hasDNs && manualItems.length > 0) {
    let existingAutoDn = null;
    if (eid) {
      const oldInv = DB.invoices.find(i => String(i.id) === String(eid));
      if (oldInv && oldInv.dnIds && oldInv.dnIds.length === 1) {
        const potentialDn = DB.delivery.find(d => String(d.id) === String(oldInv.dnIds[0]));
        if (potentialDn && String(potentialDn.num).includes('إذن تلقائي')) {
          existingAutoDn = potentialDn;
        }
      }
    }

    const dnPayload = {
      client_id: cid,
      dn_num: 'إذن تلقائي للفاتورة ' + invNumVal,
      delivery_date: invDateVal,
      items: manualItems,
      status: 'مقبول',
      invoiced: true
    };

    if (existingAutoDn) {
      await sbUpdate('delivery_notes', existingAutoDn._dbId, dnPayload);
      dnIds = [existingAutoDn.id];
    } else {
      const newDn = await sbInsert('delivery_notes', dnPayload);
      if (newDn) dnIds = [newDn.id];
      else { hideLoader(); return; }
    }
  }

  const dnForContract = dnIds.length > 0 ? DB.delivery.find(d => String(d.id) === String(dnIds[0])) : null;

  const payload = { 
    client_id: cid,
    contract_id: dnForContract?.contractId || null, // Default to 'غير مدفوعة' if status is not provided.
    invoice_num: invNumVal,
    invoice_date: invDateVal,
    dn_ids: dnIds,
    sub_total: c.sub||0,
    vat_amount: c.vat||0,
    wht_amount: c.wht||0,
    ins_amount: c.insAmt||0,
    ops_amount: c.opsAmt||0,
    late_fee: c.late||0,
    exp_loaded: c.exp||0,
    net_amount: c.net||0,
    adm_net: c.admNet||0, 
    ops_rate: c.opsRate||0,
    apply_vat: _invToggles.vat, // Default to 'غير مدفوعة' if status is not provided.
    apply_wht: _invToggles.wht,
    status: 'active'
  };

  let savedInv = null;
  if(eid && eid !== '') {
    const oldInv = DB.invoices.find(i => String(i.id) === String(eid) || String(i._dbId) === String(eid));
    const removedDNs = (oldInv?.dnIds || []).filter(id => !dnIds.includes(id));
    for(const did of removedDNs) {
      const d = DB.delivery.find(x => String(x.id) === String(did));
      if(d?._dbId) await sbUpdate('delivery_notes', d._dbId, { invoiced: false });
    }
    savedInv = await sbUpdate('invoices', oldInv?._dbId || eid, payload);
    if(savedInv) showToast('✓ تم تعديل الفاتورة');
  } else {
    savedInv = await sbInsert('invoices', payload);
    if(savedInv) showToast('✓ تم إصدار الفاتورة بنجاح');
  }
  
  if(savedInv) {
    for(const did of dnIds) {
      const d = DB.delivery.find(x => String(x.id) === String(did));
      if(d?._dbId) await sbUpdate('delivery_notes', d._dbId, { invoiced: true });
    }
    closeMod('invoice');
    await loadAllData();
    // تحديث الصفحات يدوياً للتأكد من ظهور البيانات
    renderInvoices();
    renderDiscountedInvoices();
    renderReceivables();
  }
  hideLoader();
}

// ==================== AUTO LOAD ON LOGIN ====================
async function doLogin() {
  const username = document.getElementById('login-user')?.value?.trim(); 
  const password = document.getElementById('login-pass')?.value;
  const errEl = document.getElementById('login-error');

  if(!username||!password) {
    errEl.style.display='block';
    errEl.textContent='يرجى إدخال اسم المستخدم وكلمة المرور';
    return;
  }

  showLoader();
  // Load users from Supabase first to verify login
  let users = [];
  try {
    users = await sbGet('users');
  } catch (e) {
    console.error("فشل جلب المستخدمين:", e);
    showToast("⚠️ فشل الاتصال بالسحاب لجلب المستخدمين", "error");
  }
  
  // ضمان وجود مستخدم "marvel" في القائمة إذا كانت قاعدة البيانات فارغة تماماً
  if (!users || users.length === 0) {
    console.log("No users in cloud, using local fallback");
    users = [...DB.users];
  } else {
    console.log("Cloud users found:", users.length);
  }

  if (!users.find(u => u.username === 'marvel')) {
    users.push({id: 1, name: 'marvel', username: 'marvel', role: 'مدير'});
  }

  const user = users.find(u => u.username?.toLowerCase() === username.toLowerCase());

  // Check password - from localStorage (persists across sessions)
  const storedPass = localStorage.getItem('pwd_' + username.toLowerCase());
  const expectedPass = storedPass || USER_PASSWORDS[username.toLowerCase()] || '1234';
  
  if(!user||password!==expectedPass) {
    hideLoader();
    errEl.style.display='block';
    errEl.textContent = user ? 'كلمة المرور غير صحيحة' : 'اسم المستخدم غير موجود في قاعدة البيانات';
    document.getElementById('login-pass').value = '';
    return;
  }

  currentUser = {id:user.id,name:user.name,username:user.username,role:user.role};
  localStorage.setItem('ggr_session', JSON.stringify(currentUser)); // حفظ الجلسة
  errEl.style.display='none';

  showAppMainUI(user);
  
  // Load all data
  await loadAllData();
  hideLoader();
}

// دالة موحدة لإظهار واجهة البرنامج
function showAppMainUI(user) {
  document.getElementById('login-page').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('topbar').style.display='flex';
  document.getElementById('main').style.paddingTop='80px';
  document.getElementById('topbar-name').textContent=user.name;
  document.getElementById('topbar-role').textContent=user.role;
  document.getElementById('topbar-avatar').textContent=user.name.charAt(0).toUpperCase();

  if(user.role==='موظف') restrictEmployee();
}

// ==================== AUTH TABS ====================
function switchAuthTab(tab){
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
  document.getElementById('panel-login').style.display = tab==='login'?'block':'none';
  document.getElementById('panel-register').style.display = tab==='register'?'block':'none';
  document.getElementById('login-error').style.display='none';
  const re=document.getElementById('reg-error');if(re)re.style.display='none';
}

// ==================== REGISTER ====================
async function doRegister(){
  const name = document.getElementById('reg-name')?.value?.trim();
  const username = document.getElementById('reg-user')?.value?.trim();
  const pass = document.getElementById('reg-pass')?.value;
  const pass2 = document.getElementById('reg-pass2')?.value;
  const role = document.getElementById('reg-role')?.value||'موظف';
  const errEl = document.getElementById('reg-error');
  const okEl = document.getElementById('reg-success');

  errEl.style.display='none'; okEl.style.display='none';
  
  if(!name){errEl.style.display='block';errEl.textContent='الاسم الكامل مطلوب';return;}
  if(!username){errEl.style.display='block';errEl.textContent='اسم المستخدم مطلوب';return;}
  if(username.length < 3){errEl.style.display='block';errEl.textContent='اسم المستخدم 3 أحرف على الأقل';return;}
  if(!/^[a-zA-Z0-9_]+$/.test(username)){errEl.style.display='block';errEl.textContent='اسم المستخدم بالإنجليزية فقط بدون مسافات';return;}
  if(!pass||pass.length<6){errEl.style.display='block';errEl.textContent='كلمة المرور 6 أحرف على الأقل';return;}
  if(pass!==pass2){errEl.style.display='block';errEl.textContent='كلمتا المرور غير متطابقتين';return;}

  showLoader();
  try{
    // Check username not taken
    const existing = await sbGet('users', `username=eq.${username}`);
    if(existing && existing.length>0){
      hideLoader();
      errEl.style.display='block';
      errEl.textContent='اسم المستخدم مستخدم من قبل — اختر اسماً آخر';
      return;
    }
    // Insert new user
    const res = await sbInsert('users', {name, username, role});
    if(res){
      USER_PASSWORDS[username] = pass;
    localStorage.setItem('pwd_'+username, pass);
      hideLoader();
      // Clear fields
      ['reg-name','reg-user','reg-pass','reg-pass2'].forEach(id=>{
        const el=document.getElementById(id);if(el)el.value='';
      });
      okEl.style.display='block';
      okEl.textContent='✓ تم إنشاء الحساب بنجاح! يمكنك تسجيل الدخول الآن';
      // Auto switch to login after 2 sec
      setTimeout(()=>{
        switchAuthTab('login');
        document.getElementById('login-user').value=username;
        document.getElementById('login-pass').focus();
      }, 2000);
    } else {
      hideLoader();
      errEl.style.display='block';
      errEl.textContent='حدث خطأ أثناء إنشاء الحساب — حاول مرة أخرى';
    }
  } catch(e){
    hideLoader();
    errEl.style.display='block';
    errEl.textContent='خطأ: '+e.message;
  }
}

// ==================== FIRST TIME SETUP CHECK ====================
async function checkFirstTimeSetup(){
  showLoader();
  let users = [];
  try{
    users = await sbGet('users');
    if(!users || users.length===0){
      // لا يوجد مستخدمون - إظهار واجهة إنشاء حساب المدير
      switchAuthTab('register');
      document.getElementById('tab-login').style.display='none';
      const hint = document.createElement('div');
      hint.style.cssText='background:#dbeafe;border:1px solid #93c5fd;border-radius:8px;padding:10px 14px;font-size:12px;color:#1d4ed8;margin-bottom:14px;text-align:center;font-weight:600';
      hint.textContent='🎉 مرحباً! هذه أول مرة تستخدم النظام — أنشئ حساب المدير أولاً';
      document.getElementById('panel-register').insertBefore(hint, document.getElementById('panel-register').firstChild);
      // Force admin role
      const roleEl = document.getElementById('reg-role');
      if(roleEl){roleEl.value='مدير';roleEl.disabled=true;}
    }
  } catch(e){
    console.log('Setup check failed:', e);
    showToast('⚠️ فشل الاتصال بقاعدة البيانات: ' + e.message, 'error');
  } finally {
    hideLoader();
  }

  // التحقق من وجود جلسة نشطة عند التحميل
  const session = localStorage.getItem('ggr_session');
  if(session) {
      const user = JSON.parse(session);
      currentUser = user;
      showAppMainUI(user);
      loadAllData();
  }
}

  };

  if(!confirm('هل أنت متأكد من استيراد كافة البيانات القديمة؟ سيؤدي ذلك لإنشاء سجلات حقيقية في قاعدة البيانات.')) return;
  showLoader('جاري استيراد البيانات التاريخية...');

  try {
    // 1. Create unique Clients map
    const uniqueCompanies = [...new Set(rawData.invoices.map(i => i.company))];
    const clientMap = {};
    for (const name of uniqueCompanies) {
      let client = await sbGet('clients', `name=eq."${name}"`);
      if (!client || client.length === 0) {
        const res = await sbInsert('clients', { name, ins_rate: 5 });
        clientMap[name] = res.id;
      } else {
        clientMap[name] = client[0].id;
      }
    }

    // 2. Process Invoices & create Delivery Notes
    const invoiceMap = {};
    for (const inv of rawData.invoices) {
      // Find items for this invoice // This is a duplicate definition of cols.
      const invItems = rawData.items.filter(it => it.invoice_id === inv.invoice_id).map(it => ({
        d: it.item_name, q: it.quantity, p: it.price, u: 'وحدة', i: 5, o: 0, total: it.quantity * it.price
      }));
      
      // Create a Delivery Note first
      const dn = await sbInsert('delivery_notes', {
        client_id: clientMap[inv.company],
        dn_num: 'OLD-DN-' + inv.invoice_id,
        delivery_date: inv.date,
        items: invItems.length ? invItems : [{d: 'بضاعة متنوعة', q: 1, p: inv.totalFinal - (inv.vat || 0) + (inv.withholding || 0), u: 'مقطوعية', i: 5, o: 0, total: 0}],
        status: 'مقبول',
        invoiced: true
      });

      // Create the Invoice
      const sbInv = await sbInsert('invoices', {
        client_id: clientMap[inv.company],
        invoice_num: inv.invoice_id.toString(),
        invoice_date: inv.date,
        dn_ids: [dn.id],
        sub_total: inv.totalFinal - (inv.vat || 0) + (inv.withholding || 0),
        vat_amount: inv.vat || 0,
        wht_amount: inv.withholding || 0,
        ins_amount: 0,
        net_amount: inv.totalFinal,
        status: inv.status === 'paid' ? 'مدفوعة' : 'غير مدفوعة'
      });
      invoiceMap[inv.invoice_id] = sbInv.id;
    }

    // 3. Process Payments
    for (const pay of rawData.payments) {
      if (invoiceMap[pay.invoice_id]) {
        await sbInsert('payments', {
          client_id: clientMap[rawData.invoices.find(i => i.invoice_id === pay.invoice_id)?.company],
          invoice_id: invoiceMap[pay.invoice_id],
          amount: pay.amount,
          payment_date: pay.date,
          method: 'تحويل بنكي',
          notes: 'مرحل من النظام القديم'
        });
      }
    }

    // 4. Process Rejected
    for (const rej of rawData.rejectedInvoices) {
      await sbInsert('rejected_invoices', {
        invoice_num: rej.invoice_id.toString(),
        client_name: rej.company,
        rejected_date: rej.rejectDate,
        rejection_reason: rej.rejectReason,
        net_amount: rej.totalFinal,
        original_data: rej
      });
    }

    showToast('✓ تمت عملية الهجرة بنجاح تام');
    await loadAllData();
  } catch (e) {
    console.error(e);
    showToast('خطأ أثناء الاستيراد: ' + e.message, 'error');
  } finally {
    hideLoader();
  }
}
